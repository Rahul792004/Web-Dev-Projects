<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top 10 Private Universities in India</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f9fa;
      margin: 0;
    }
    header {
      background: #003366;
      color: white;
      text-align: center;
      padding: 20px;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      transition: transform 0.3s;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .card-content {
      padding: 15px;
    }
    .card-content h3 {
      margin: 0;
      color: #003366;
    }
    .card-content p {
      margin: 8px 0;
    }
    .card-content a {
      display: inline-block;
      margin-top: 10px;
      text-decoration: none;
      background: #003366;
      color: white;
      padding: 8px 15px;
      border-radius: 5px;
      transition: background 0.3s;
    }
    .card-content a:hover {
      background: #0055a5;
    }
  </style>
</head>
<body>
  <header>
    <h1>Top 10 Private Universities in India</h1>
  </header>
  <div class="container" id="university-list"></div>

  <script>
    const universities = [
      {img:"C:/Users/HP/Downloads/kiit.jpeg", name:"KIIT University, Bhubaneswar", fees:"₹3–4 Lakh/year", eligibility:"60% in 10+2 (PCM), KIITEE exam", best:"Placements, Infrastructure", link:"https://kiit.ac.in/"},
      {img:"C:/Users/HP/Downloads/Iter.jpeg", name:"ITER (SOA University), Bhubaneswar", fees:"₹2.5–3 Lakh/year", eligibility:"JEE Main / SAAT", best:"Teaching, Academic Excellence", link:"https://www.soa.ac.in/iter"},
      {img:"C:/Users/HP/Downloads/CV Raman.jpeg", name:"CV Raman Global University, Bhubaneswar", fees:"₹2–3 Lakh/year", eligibility:"JEE Main / OJEE", best:"Teaching, Research, Innovation, Placements", link:"https://cgu-odisha.ac.in/"},
      {img:"C:/Users/HP/Downloads/srm.jpeg", name:"SRM Institute of Science & Technology, Chennai", fees:"₹2.5–4 Lakh/year", eligibility:"SRMJEEE", best:"Global Exposure, Placements", link:"https://www.srmist.edu.in/"},
      {img:"C:/Users/HP/Downloads/vit.jpeg", name:"VIT University, Vellore", fees:"₹2–4 Lakh/year", eligibility:"VITEEE", best:"Placements, Research", link:"https://vit.ac.in/"},
      {img:"C:/Users/HP/Downloads/amity.jpeg", name:"Amity University, Noida", fees:"₹3–5 Lakh/year", eligibility:"60% in 10+2 + Entrance", best:"Industry Connect, International Tie-ups", link:"https://www.amity.edu/"},
      {img:"C:/Users/HP/Downloads/lpu.jpeg", name:"Lovely Professional University, Punjab", fees:"₹1.5–3 Lakh/year", eligibility:"LPUNEST / JEE Main", best:"Diversity, Startups", link:"https://www.lpu.in/"},
      {img:"C:/Users/HP/Downloads/manipal.jpeg", name:"Manipal Academy of Higher Education, Karnataka", fees:"₹3–5 Lakh/year", eligibility:"MET Exam", best:"Global Reputation, Research", link:"https://manipal.edu/"},
      {img:"C:/Users/HP/Downloads/christ.avif", name:"Christ University, Bangalore", fees:"₹1.5–2.5 Lakh/year", eligibility:"CUET / Merit", best:"Teaching, Cultural Exposure", link:"https://christuniversity.in/"},
      {img:"C:/Users/HP/Downloads/bits pilani.jpeg", name:"BITS Pilani", fees:"₹4–5 Lakh/year", eligibility:"BITSAT", best:"Research, Startups, Placements", link:"https://www.bits-pilani.ac.in/"}
    ];

    const container = document.getElementById("university-list");

    universities.forEach(u => {
      container.innerHTML += `
        <div class="card">
          <img src="${u.img}" alt="${u.name}">
          <div class="card-content">
            <h3>${u.name}</h3>
            <p><b>Fees:</b> ${u.fees}</p>
            <p><b>Eligibility:</b> ${u.eligibility}</p>
            <p><b>Best For:</b> ${u.best}</p>
            <a href="${u.link}" target="_blank">Visit Website</a>
          </div>
        </div>
      `;
    });
  </script>
</body>
</html>
